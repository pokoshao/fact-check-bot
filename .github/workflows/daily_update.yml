name: Update Knowledge Base

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 加入這行可以直接壓制警告並強制使用新環境
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 確保是 v4
      - uses: actions/setup-python@v5 # 確保是 v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install feedparser pandas requests
        
      - name: Run Scraper
        run: python update_kb.py # 確認檔名正確
        
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 先抓取遠端更新，避免衝突
          git pull --rebase origin main
          
          # 2. 加入新產生的時間戳記檔案
          git add kb_raw_*.csv nemo_raw_*.jsonl
          
          # 3. 提交並推送到雲端
          # 如果沒有檔案變更，commit 會回傳 1，所以加上 || exit 0
          git commit -m "Auto-update knowledge base: $(date)" || exit 0
          
          # 4. 推送，如果還是失敗就嘗試強制推送 (請小心使用)
          git push origin main
