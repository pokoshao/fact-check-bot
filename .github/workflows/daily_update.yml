name: Update Knowledge Base

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 加入這行可以直接壓制警告並強制使用新環境
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 確保是 v4
      - uses: actions/setup-python@v5 # 確保是 v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install feedparser pandas requests
        
      - name: Run Scraper
        run: python update_kb.py # 確認檔名正確
        
      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5 # 如果你有用這個，也要升級到 v5
        with:
          commit_message: "Auto update data"
          file_pattern: 'kb_raw_*.csv nemo_raw_*.jsonl'
